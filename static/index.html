<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>OmniUI</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="tab-list" id="tabList"></div>
      <button id="newWorkflowBtn">+ Workflow</button>
      <button id="saveWorkflowBtn">Save</button>
      <button id="runWorkflowBtn">Run</button>
    </header>

    <main class="layout">
      <aside class="sidebar">
        <h3>Nodes</h3>
        <div id="nodePalette"></div>
        <hr />
        <h3>Custom Nodes</h3>
        <pre id="customNodesInfo"></pre>
        <h3>Model Registry</h3>
        <button id="refreshModelsBtn">Refresh</button>
        <pre id="modelRegistry"></pre>
        <h3>Runtime</h3>
        <pre id="runtimeInfo"></pre>
        <hr />
        <button id="exportJsonBtn">Export JSON</button>
        <input type="file" id="importJsonInput" accept="application/json" />
      </aside>
      <section class="canvas-wrap" id="canvasWrap">
        <div id="graphSurface">
          <svg id="edgeLayer"></svg>
          <div id="canvas"></div>
        </div>
      </section>
    </main>

    <div id="nodeSearchOverlay" class="hidden">
      <div class="node-search-modal">
        <h3>Add node</h3>
        <input id="nodeSearchInput" placeholder="Search nodes..." />
        <div id="nodeSearchResults"></div>
      </div>
    </div>

    <pre id="runOutput"></pre>
    <script src="/static/app.js"></script>
  </body>
</html>
